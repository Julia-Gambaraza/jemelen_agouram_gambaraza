<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapping Dead Neurons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1220;
    --text: #E8EDF4;
    --text-dim: #8FA3BF;
    --accent: #5EEAD4;
    --line: #1E2E45;
    --font-display: "Newsreader", serif;
    --font-mono: "Space Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 2rem;
    border-bottom: 1px solid var(--line);
    background: rgba(11, 18, 32, 0.85);
    backdrop-filter: blur(6px);
    z-index: 10;
  }

  .logo {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .accent-letter { color: var(--accent); }

  nav { display: flex; gap: 2rem; }

  nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  nav a:hover { color: var(--accent); }

  main {
    padding: 4rem 2rem 2rem;
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }

  main h1 {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 2.2rem;
    letter-spacing: -0.01em;
    margin-bottom: 0.5rem;
  }

  main p.tagline { color: var(--text-dim); margin-bottom: 0; }

  /* ---- Bloc auteur façon Distill ---- */
  .byline {
    max-width: 700px;
    margin: 3rem auto 0;
    padding: 2rem;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    text-align: left;
  }

  .byline-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(120px, 1fr));
    column-gap: 2rem;
    row-gap: 0.6rem;
  }

  .byline-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 0.4rem;
  }

  .byline-value {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.05rem;
    color: var(--text);
    margin: 0;
  }

  .byline-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin: 0.15rem 0 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>M</span><span>D</span><span>N</span></div>
  <nav>
    <a href="#">Project</a>
    <a href="#">GMIC</a>
    <a href="https://github.com/Julia-Gambaraza" target="_blank">GitHub</a>
  </nav>
</header>

<main>
  <h1><span class="accent-letter">M</span>apping <span class="accent-letter">D</span>ead <span class="accent-letter">N</span>eurons</h1>
  <p class="tagline">Finding dead neurons in GMIC</p>
</main>

<div class="byline">
  <div class="byline-grid">
    <p class="byline-label">Authors</p>
    <p class="byline-label">Affiliations</p>
    <p class="byline-label">Submission</p>

    <p class="byline-value">Emilien Jemelen</p>
    <p class="byline-value">HeKa</p>
    <p class="byline-value">VISxAI 2026</p>

    <p class="byline-value">Safa Agouram</p>
    <p class="byline-value">ENSIIE</p>
    <p></p>

    <p class="byline-value">Julia Gambaraza</p>
    <p class="byline-value">ESPCI Paris</p>
    <p></p>
  </div>
</div>

</body>
</html>
